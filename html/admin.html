<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="dashboard">

    <aside class="sidebar">
        <h2>Admin</h2>

        <ul>
            <li>Dashboard</li>
            <li>Dự án</li>
            <li>Kỹ năng</li>
            <li>Chứng chỉ</li>
            <li>Đăng xuất</li>
        </ul>
    </aside>

    <main class="content">

        <header>
            <h1>Trang quản trị Portfolio</h1>
        </header>

        <section class="cards">

            <div class="card">
                <h3>Dự án</h3>
                <p>5 dự án</p>
            </div>

            <div class="card">
                <h3>Kỹ năng</h3>
                <p>12 kỹ năng</p>
            </div>

            <div class="card">
                <h3>Chứng chỉ</h3>
                <p>2 chứng chỉ</p>
            </div>

        </section>

        <section class="project-table">

            <h2>Danh sách dự án</h2>

            <table>
                <tr>
                    <th>Tên dự án</th>
                    <th>Công nghệ</th>
                    <th>Trạng thái</th>
                </tr>

                <tr>
                    <td>Portfolio Website</td>
                    <td>HTML, CSS</td>
                    <td>Hoàn thành</td>
                </tr>

                <tr>
                    <td>Shop Website</td>
                    <td>PHP, MySQL</td>
                    <td>Đang phát triển</td>
                </tr>
            </table>

        </section>

    </main>

</div>

</body>
</html>
