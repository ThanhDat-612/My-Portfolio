<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">

    <!-- Navigation Float -->
    <nav class="nav-float">
        <button class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </button>
        <div class="nav-menu" id="navMenu">
            <a href="#" class="nav-item active" data-section="dashboard">
                <i class="fas fa-chart-line"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-section="projects">
                <i class="fas fa-folder"></i>
                <span>Dự án</span>
            </a>
            <a href="#" class="nav-item" data-section="skills">
                <i class="fas fa-star"></i>
                <span>Kỹ năng</span>
            </a>
            <a href="#" class="nav-item" data-section="certificates">
                <i class="fas fa-award"></i>
                <span>Chứng chỉ</span>
            </a>
            <a href="#" class="nav-item logout" data-section="logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Đăng xuất</span>
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Header -->
        <header class="header-section">
            <div class="header-content">
                <h1>Trang quản trị </h1>
                <p>Quản lý thông tin cá nhân và dự án</p>
            </div>
            <img src="../pics/avt.png" alt="Avatar" class="header-avatar">
        </header>

        <!-- Stats Cards in Unique Layout -->
        <section class="stats-section">
            <div class="stat-card large">
                <div class="stat-icon">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <div class="stat-content">
                    <h3>5</h3>
                    <p>Dự án</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-code"></i>
                </div>
                <div class="stat-content">
                    <h3>12</h3>
                    <p>Kỹ năng</p>
                </div>
            </div>

            <div class="stat-card">
                <div class="stat-icon">
                    <i class="fas fa-medal"></i>
                </div>
                <div class="stat-content">
                    <h3>2</h3>
                    <p>Chứng chỉ</p>
                </div>
            </div>
        </section>

        <!-- Projects Table Section -->
        <section class="table-section">
            <div class="section-header">
                <h2>Danh sách dự án</h2>
                <button class="btn-add">
                    <i class="fas fa-plus"></i> Thêm dự án
                </button>
            </div>

            <table class="projects-table">
                <thead>
                    <tr>
                        <th>Tên dự án</th>
                        <th>Công nghệ</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Portfolio Website</td>
                        <td><span class="tech-tag">HTML</span><span class="tech-tag">CSS</span></td>
                        <td><span class="status completed">Hoàn thành</span></td>
                        <td class="actions">
                            <button class="btn-icon edit" title="Chỉnh sửa"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon delete" title="Xóa"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>

                    <tr>
                        <td>Shop Website</td>
                        <td><span class="tech-tag">PHP</span><span class="tech-tag">MySQL</span></td>
                        <td><span class="status developing">Đang phát triển</span></td>
                        <td class="actions">
                            <button class="btn-icon edit" title="Chỉnh sửa"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon delete" title="Xóa"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>

</div>

</body>
</html>
