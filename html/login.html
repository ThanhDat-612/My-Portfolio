<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <link rel="stylesheet" href="../css/auth.css">
    
</head>
    
<body>

<div class="login-box">

    <div class="dog-area">
        <div class="bg">    </div>
        <img src="https://cdn.dribbble.com/userupload/29122727/file/original-04ae721e0abf3f8b6cd91ea1a6803083.gif" id="dog">
    </div>

    <h2>Đăng nhập</h2>
    <div class="login">
        <div class="input-group">
            <img src="../pics/account.png" alt="login-icon" class="icon">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
        </div>
        <div class="input-group">
            <img src="../pics/password.png" alt="password-icon" class="icon">
            <input type="password" name="password" placeholder="Mật khẩu" required>
        </div>

        <button type="submit">
            <a href="admin.html" target="_blank">Đăng nhập</a>
        </button>
    </div>

    <div class="register">
        Chưa có tài khoản? <a href="register.html">Đăng ký</a>
    </div>
</div>
</body>
</html>
